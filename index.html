;\n  }\n  .hero__kicker span{ color: var(--gold); font-style: normal; }\n  .hero__kicker em{ font-style: normal; color: var(--violet); }\n  .hero__title{\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: clamp(54px, 13vw, 104px);\n    line-height: 1.02;\n    letter-spacing: 0.02em;\n    margin: 0;\n    color: var(--text);\n    text-shadow: 0 0 40px rgba(233,176,74,0.20), 0 0 80px rgba(155,140,255,0.12);\n  }\n\n  .ornament{\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 16px;\n    margin: 38px auto 0;\n    max-width: 280px;\n  }\n  .ornament__line{\n    flex: 1; height: 1px;\n    background: linear-gradient(90deg, transparent, var(--border-hi));\n  }\n  .ornament__line--right{ background: linear-gradient(90deg, var(--border-hi), transparent); }\n  .ornament__gem{\n    width: 9px; height: 9px; flex: none;\n    background: linear-gradient(135deg, var(--gold), var(--violet));\n    transform: rotate(45deg);\n    border-radius: 2px;\n    box-shadow: 0 0 14px rgba(233,176,74,0.4);\n  }\n\n  /* ===== Màn mở đầu: tiêu đề hiện ra mượt khi vào trang ===== */\n  @media (prefers-reduced-motion: no-preference){\n    .hero__kicker{ animation: heroFade 1s ease both 0.2s; }\n    .hero__title{ animation: heroTitle 1.35s cubic-bezier(.2,.7,.2,1) both 0.42s; }\n    .ornament{ animation: heroFade 1.1s ease both 0.95s; }\n    .veil{ animation: veilFade 1.6s ease both; }\n    @keyframes heroFade{\n      from{ opacity: 0; transform: translateY(12px); }\n      to{ opacity: 1; transform: translateY(0); }\n    }\n    @keyframes heroTitle{\n      0%{ opacity: 0; transform: translateY(30px) scale(.95); filter: blur(12px); letter-spacing: 0.2em; }\n      55%{ filter: blur(0); }\n      100%{ opacity: 1; transform: translateY(0) scale(1); filter: blur(0); letter-spacing: 0.02em; }\n    }\n    @keyframes veilFade{ from{ opacity: 0; } to{ opacity: 1; } }\n  }\n\n  summary{ cursor: pointer; list-style: none; user-select: none; }\n  summar \n  .stage{\n    --t: 0;\n    --top-color: var(--violet);\n    --bot-color: var(--gold);\n    position: relative;\n    flex: none;\n    scroll-snap-align: start;\n    display: flex; flex-direction: column;\n    min-width: 226px;\n    padding: 6px 0 4px;\n  }\n  .stage--wide{ min-width: 320px; }\n  .stage__head{\n    display: flex; align-items: baseline; gap: 9px;\n    padding: 0 16px; min-height: 3.4em;\n  }\n  .stage__num{\n    font-family: var(--display); font-weight: 700; font-size: 25px; line-height: 1; flex: none;\n    color: color-mix(in srgb, var(--violet) calc(26% + var(--t)*64%), var(--text-faint));\n    text-shadow: 0 0 calc(var(--t)*14px) color-mix(in srgb, var(--violet) calc(var(--t)*80%), transparent);\n  }\n  .stage__name{\n    font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--text-dim); line-height: 1.32; text-wrap: balance;\n  }\n  .stage__tag{\n    margin: 0 16px 2px; font-size: 11px; font-style: italic; min-height: 1.4em;\n    color: color-mix(in srgb, var(--gold) calc(var(--t)*70%), var(--text-faint));\n  }\n  .stage__tag--sync{ color: var(--violet-soft); font-style: normal; letter-spacing: 0.06em; }\n  .stage__tag--end{ color: var(--gold-soft); }\n\n  .stage__lanes{\n    position: relative;\n    display: flex; flex-direction: column; gap: 26px;\n    padding: 14px 16px 8px;\n  }\n\n  .lane{ position: relative; min-height: 78px; display: flex; gap: 8px; }\n  /* đường tuyến chạy ngang qua giữa mỗi làn (nối liền giữa các giai đoạn) */\n  .lane::before{\n    content:\"\"; position: absolute; top: 50%; left: -16px; right: -16px; height: 2px;\n    transform: translateY(-50%); z-index: 0; border-radius: 999px;\n  }\n  .lane--top::before{ background: color-mix(in srgb, var(--top-color) calc(28% + var(--t)*56%), transparent); }\n  .lane--bot::before{ background: color-mix(in srgb, var(--bot-color) calc(28% + var(--t)*56%), transparent); }\n  .lane--empty::before{ display: none; }   /* tuyến đã kết thúc → không kẻ */\n\ hidden=\"true\"><\u002Fcanvas>\n  <div class=\"veil\" aria-hidden=\"true\"><\u002Fdiv>\n\n  <div class=\"wrap\">\n\n    <header class=\"hero\">\n      <p class=\"hero__kicker\"><span>OurEra<\u002Fspan> &amp; <em>High and Higher<\u002Fem><\u002Fp>\n      <h1 class=\"hero__title\">Thư Viện<\u002Fh1>\n      <div class=\"ornament\" aria-hidden=\"true\">\n        <span class=\"ornament__line\"><\u002Fspan>\n        <span class=\"ornament__gem\"><\u002Fspan>\n        <span class=\"ornament__line ornament__line--right\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <details class=\"timeline-toggle\">\n      <summary class=\"timeline-toggle__summary\">\n        <div>\n          <p class=\"timeline-toggle__title\">Hành Trình<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"summary__right\">\n          <span class=\"tl-help\" tabindex=\"0\" role=\"button\" aria-label=\"Hướng dẫn đọc\">?<span class=\"tl-help__pop\" role=\"tooltip\">\n              <h4>Cách đọc<\u002Fh4>\n              <p>Hai tuyến chạy <strong>song song<\u002Fstrong> theo từng Giai đoạn. Trong một giai đoạn, bạn có thể đọc <strong>tự do<\u002Fstrong> thứ tự hai tuyến.<\u002Fp>\n              <p>Mỗi ô có nút <strong>Tải .docx<\u002Fstrong>; bấm <strong>⋯<\u002Fstrong> để xem ảnh minh hoạ, số chương và đoạn hé lộ.<\u002Fp>\n              <div class=\"tl-help__row\"><span class=\"tl-help__sw\" style=\"background:var(--violet)\"><\u002Fspan> Tuyến Mythren — hàng trên<\u002Fdiv>\n              <div class=\"tl-help__row\"><span class=\"tl-help__sw\" style=\"background:var(--gold)\"><\u002Fspan> Tuyến Trái Đất — hàng dưới<\u002Fdiv>\n              <p>Đến <strong>Điểm Sync<\u002Fstrong> (◆) hai tuyến giao nhau — đọc đúng thứ tự để khớp mạch truyện.<\u002Fp>\n              <div class=\"tl-help__row\"><span class=\"tl-help__dot\">✦<\u002Fspan> Ngoại truyện (viền nét đứt) <strong>có thể bỏ qua<\u002Fstrong> — bấm để tải khi rảnh.<\u002Fdiv>\n              <p>Cứ thế đọc lần lượt từ Giai đoạn 1 → 8.<\u002Fp>\n            <\u002Fspan><\u002Fspan>\n          <svg class=\"summary__chevron\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsummary>\n      <div class=\"timeline-viewport\">\n        <span class=\"timeline-track\" aria-hidden=\"true\"><\u002Fspan>\n        <button type=\"button\" class=\"timeline-nav timeline-nav--prev\" aria-label=\"Cuộn về chặng trước\" disabled=\"\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M15 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <button type=\"button\" class=\"timeline-nav timeline-nav--next\" aria-label=\"Cuộn tới chặng kế tiếp\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"timeline-row\">\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">01<\u002Fspan><span class=\"stage__name\">Entry Point<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag\">Song song tự do<\u002Fp>\n            <div class=\"stage__lanes\">\n              <div class=\"lane lane--top\"><div class=\"node\"><p class=\"node__series\">Mythren<\u002Fp><p class=\"node__title\">Season 1<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/mythren/season-1.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n              <div class=\"lane lane--bot\"><div class=\"node\"><p class=\"node__series\">Trái Đất<\u002Fp><p class=\"node__title\">Bộ Trái Đất<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/bo-trai-dat.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">02<\u002Fspan><span class=\"stage__name\">Song song tự do<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag\">Song song tự do<\u002Fp>\n            <div class=\"stage__lanes\">\n              <div class=\"lane lane--top\"><div class=\"node\"><p class=\"node__series\">Mythren<\u002Fp><p class=\"node__title\">Season 2<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/mythren/season-2.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n              <div class=\"lane lane--bot\"><div class=\"node\"><p class=\"node__series\">Trái Đất<\u002Fp><p class=\"node__title\">Liglig · S1<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/liglig-s1.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">03<\u002Fspan><span class=\"stage__name\">Long &amp; Hoa khởi động<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag\">Song song<\u002Fp>\n            <div class=\"stage__lanes\">\n              <div class=\"lane lane--top\"><div class=\"node\"><p class=\"node__series\">Mythren<\u002Fp><p class=\"node__title\">Season 3<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/mythren/season-3.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n              <div class=\"lane lane--bot\"><div class=\"node\"><p class=\"node__series\">Trái Đất<\u002Fp><p class=\"node__title\">Long &amp; Hoa · S1<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/long-hoa-s1.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"stage__extra\">\n              <button class=\"extra\" type=\"button\" data-peek=\"chapters/ourera/ngoai-truyen/fiona.docx\">Ngoại truyện Fiona<\u002Fbutton>\n              <button class=\"extra\" type=\"button\" data-peek=\"chapters/ourera/ngoai-truyen/vanvande.docx\">Ngoại truyện Vanvande<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">04<\u002Fspan><span class=\"stage__name\">Điểm Sync 1<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag stage__tag--sync\">◆ Điểm Sync<\u002Fp>\n            <div class=\"stage__lanes\">\n              <span class=\"sync\" aria-hidden=\"true\"><\u002Fspan>\n              <div class=\"lane lane--top\"><div class=\"node\"><p class=\"node__series\">Mythren<\u002Fp><p class=\"node__title\">Season 4<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/mythren/season-4.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n              <div class=\"lane lane--bot\"><div class=\"node\"><p class=\"node__series\">Trái Đất<\u002Fp><p class=\"node__title\">Long &amp; Hoa · S2<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/long-hoa-s2.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">05<\u002Fspan><span class=\"stage__name\">Điểm Sync 2<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag stage__tag--sync\">◆ Điểm Sync<\u002Fp>\n            <div class=\"stage__lanes\">\n              <span class=\"sync\" aria-hidden=\"true\"><\u002Fspan>\n              <div class=\"lane lane--top\"><div class=\"node\"><p class=\"node__series\">Mythren<\u002Fp><p class=\"node__title\">Season 5<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/mythren/season-5.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n              <div class=\"lane lane--bot\"><div class=\"node\"><p class=\"node__series\">Trái Đất<\u002Fp><p class=\"node__title\">Long &amp; Hoa · S3<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/long-hoa-s3.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">06<\u002Fspan><span class=\"stage__name\">Mythren kết thúc<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag stage__tag--end\">Khép tuyến Mythren<\u002Fp>\n            <div class=\"stage__lanes\">\n              <div class=\"lane lane--top\"><div class=\"node\"><p class=\"node__series\">Mythren<\u002Fp><p class=\"node__title\">Season 6<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/mythren/season-6.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n              <div class=\"lane lane--bot lane--empty\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"stage__extra\">\n              <button class=\"extra\" type=\"button\" data-peek=\"chapters/mythren/ngoai-truyen/lucard.docx\">Ngoại truyện · Quá khứ Lucard<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage\">\n            <div class=\"stage__head\"><span class=\"stage__num\">07<\u002Fspan><span class=\"stage__name\">Liglig Season 2<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag\"><\u002Fp>\n            <div class=\"stage__lanes\">\n              <div class=\"lane lane--top lane--empty\"><\u002Fdiv>\n              <div class=\"lane lane--bot\"><div class=\"node\"><p class=\"node__series\">Trái Đất<\u002Fp><p class=\"node__title\">Liglig · S2<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/liglig-s2.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"stage stage--wide\">\n            <div class=\"stage__head\"><span class=\"stage__num\">08<\u002Fspan><span class=\"stage__name\">Giải đáp<\u002Fspan><\u002Fdiv>\n            <p class=\"stage__tag stage__tag--end\">Khép lại<\u002Fp>\n            <div class=\"stage__lanes\">\n              <div class=\"lane lane--top lane--empty\"><\u002Fdiv>\n              <div class=\"lane lane--bot\">\n                <div class=\"node\"><p class=\"node__series\">Bộ Yue<\u002Fp><p class=\"node__title\">Quá khứ<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/yue-qua-khu.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv>\n                <div class=\"node\"><p class=\"node__series\">Bộ Yue<\u002Fp><p class=\"node__title\">Hiện tại<\u002Fp><button class=\"node__peek\" type=\"button\" data-peek=\"chapters/ourera/yue-hien-tai.docx\" aria-label=\"Hé lộ\">⋯<\u002Fbutton><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n\n    <footer>\n      <p class=\"footer__brand\">2oKODAMI<\u002Fp>\n      <div class=\"footer__links\">\n        <a href=\"https://www.facebook.com/Tinedatt001/\" target=\"_blank\" rel=\"noopener\" aria-label=\"Facebook\" title=\"Facebook\">\n          <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M14 13.5h2.5l1-4H14V7.5c0-1.03 0-2 2-2h1.5V2.14c-.33-.04-1.55-.14-2.84-.14C11.93 2 10 3.66 10 6.7v2.8H7v4h3V22h4z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a class=\"footer__mail\" href=\"mailto:tiendatvd2202@gmail.com\" aria-label=\"Gmail\" title=\"Gửi email\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3.5 6.5 12 13l8.5-6.5\"><\u002Fpath><\u002Fsvg>\n          tiendatvd2202@gmail.com\n        <\u002Fa>\n      <\u002Fdiv>\n      <p>Cảm ơn bạn đã ghé thăm hai thế giới này.<br>\n      Trang được lưu trữ miễn phí trên GitHub Pages.<\u002Fp>\n    <\u002Ffooter>\n\n    <div class=\"peek\" aria-hidden=\"true\">\n      <div class=\"peek__card\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Hé lộ\">\n        <button class=\"peek__close\" type=\"button\" aria-label=\"Đóng\">✕<\u002Fbutton>\n        <div class=\"peek__img\"><img alt=\"\"><span class=\"peek__imgph\">Ảnh minh hoạ<\u002Fspan><\u002Fdiv>\n        <div class=\"peek__body\">\n          <p class=\"peek__cap\"><\u002Fp>\n          <p class=\"peek__series\"><\u002Fp>\n          <h3 class=\"peek__title\"><\u002Fh3>\n          <p class=\"peek__chapters\"><\u002Fp>\n          <div class=\"peek__teaserwrap\">\n            <p class=\"peek__label\">Đoạn hé lộ<\u002Fp>\n            <p class=\"peek__teaser\"><\u002Fp>\n            <button class=\"peek__reroll\" type=\"button\">↻ Đoạn khác<\u002Fbutton>\n          <\u002Fdiv>\n          <a class=\"peek__dl\" href=\"#\" download=\"\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4M5 21h14\"><\u002Fpath><\u002Fsvg>Tải .docx<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <script>\n  /* Cường độ vũ trụ: 0 = đầu timeline (đứng yên) → 1 = cuối timeline (xoay nhanh).\n     Cập nhật khi cuộn timeline; nền canvas đọc để quyết định tốc độ xoay & đuôi sao. */\n  var cosmicDepth = 0;\n\n  /* ============ NỀN VŨ TRỤ TƯƠNG TÁC ============ */\n  (function(){\n    var canvas = document.getElementById('cosmos');\n    if(!canvas) return;\n    var ctx = canvas.getContext('2d');\n    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    var glow = 0; // bản làm mượt của cosmicDepth\n\n    var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 1.5);\n    var stars = [], rot = 0;\n\n    function resize(){\n      W = canvas.clientWidth = window.innerWidth;\n      H = canvas.clientHeight = window.innerHeight;\n      canvas.width = W * DPR; canvas.height = H * DPR;\n      ctx.setTransform(DPR,0,0,DPR,0,0);\n      build();\n    }\n\n    function build(){\n      var maxR = Math.hypot(W, H) * 0.82;\n      stars = [];\n      var count = Math.round((W*H)/3200);\n      for(var i=0;i<count;i++){\n        var radius = Math.pow(Math.random(), 0.78) * maxR;  // dồn nhẹ về tâm\n        var tint = Math.random();\n        var col = '255,255,255';\n        if(tint > 0.93) col = '245,210,138';        // đốm kim sắc\n        else if(tint > 0.85) col = '210,200,255';    // đốm tím\n        else if(tint > 0.74) col = '175,222,255';    // trắng xanh\n        stars.push({\n          radius: radius,\n          ang: Math.random()*Math.PI*2,\n          w: 0.5 + Math.random()*1.5,\n          base: 0.3 + Math.random()*0.6,\n          col: col,\n          spin: 1 + (Math.random()-0.5)*0.10,        // biến thiên nhẹ cho tự nhiên\n          tw: Math.random()*Math.PI*2,\n          tws: 0.6 + Math.random()*1.4\n        });\n      }\n    }\n\n    // aurora tĩnh — rực rỡ dần theo độ sâu timeline (glow), không đi theo con trỏ\n    function drawAurora(){\n      var ac = W*0.5, ay0 = H*0.46;\n      // cực quang tím: chính, mạnh dần theo glow\n      var v = 0.13 + glow*0.17;\n      var g1 = ctx.createRadialGradient(ac, ay0-40, 0, ac, ay0-40, Math.max(W,H)*(0.55+glow*0.2));\n      g1.addColorStop(0, 'rgba(155,140,255,'+v+')');\n      g1.addColorStop(0.4, 'rgba(155,140,255,'+(v*0.36)+')');\n      g1.addColorStop(1, 'rgba(155,140,255,0)');\n      ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);\n\n      // kim sắc: dịu lúc đầu, nhường chỗ cho tím khi đi sâu\n      var ax = W*0.82, ay = H*0.12;\n      var gg = 0.10 * (1 - glow*0.45);\n      var g2 = ctx.createRadialGradient(ax, ay, 0, ax, ay, Math.max(W,H)*0.5);\n      g2.addColorStop(0, 'rgba(233,176,74,'+gg+')');\n      g2.addColorStop(0.45, 'rgba(233,176,74,'+(gg*0.35)+')');\n      g2.addColorStop(1, 'rgba(233,176,74,0)');\n      ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);\n\n      // ngọc lục: nở rộ khi đi sâu\n      var bx = W*0.18, by = H*0.9;\n      var tl = 0.06 + glow*0.08;\n      var g3 = ctx.createRadialGradient(bx, by, 0, bx, by, Math.max(W,H)*0.5);\n      g3.addColorStop(0, 'rgba(120,235,200,'+tl+')');\n      g3.addColorStop(0.5, 'rgba(120,235,200,'+(tl*0.3)+')');\n      g3.addColorStop(1, 'rgba(120,235,200,0)');\n      ctx.fillStyle = g3; ctx.fillRect(0,0,W,H);\n\n      // ánh magenta sâu thẳm chỉ hiện ở cuối hành trình\n      if(glow > 0.02){\n        var g4 = ctx.createRadialGradient(W*0.5, H*0.55, 0, W*0.5, H*0.55, Math.max(W,H)*0.7);\n        g4.addColorStop(0, 'rgba(190,120,235,'+(glow*0.06)+')');\n        g4.addColorStop(0.6, 'rgba(190,120,235,'+(glow*0.02)+')');\n        g4.addColorStop(1, 'rgba(190,120,235,0)');\n        ctx.fillStyle = g4; ctx.fillRect(0,0,W,H);\n      }\n\n      // khi xoay: tối dần ở rìa, giữ trung tâm sáng (vignette)\n      if(glow > 0.02){\n        var cv = Math.min(W,H);\n        var g5 = ctx.createRadialGradient(W*0.5, H*0.46, cv*0.18, W*0.5, H*0.46, Math.max(W,H)*0.72);\n        g5.addColorStop(0, 'rgba(7,8,15,0)');\n        g5.addColorStop(0.55, 'rgba(7,8,15,'+(glow*0.20)+')');\n        g5.addColorStop(1, 'rgba(7,8,15,'+(glow*0.55)+')');\n        ctx.fillStyle = g5; ctx.fillRect(0,0,W,H);\n      }\n    }\n\n    var t = 0;\n    function frame(){\n      t += 0.016;\n      ctx.clearRect(0,0,W,H);\n\n      // làm mượt cường độ vũ trụ theo độ sâu timeline, CHỐT về 0 khi rất nhỏ\n      var target = (typeof cosmicDepth === 'number' ? cosmicDepth : 0);\n      glow += (target - glow) * 0.06;\n      if(target === 0 && glow < 0.003) glow = 0;   // hết kéo → sao đứng yên hẳn\n\n      drawAurora();\n\n      // tâm cố định. glow = 0 → sao ĐỨNG YÊN (đốm trắng, không đuôi, không trôi).\n      // Kéo timeline đủ sâu → glow tăng → sao xoay nhanh dần, đuôi dài dần.\n      var cx = W*0.5, cy = H*0.46;\n      if(glow > 0) rot += glow * 0.0095;           // chỉ xoay khi thật sự có độ sâu\n\n      var sp = Math.min(1.7, glow * 1.9);\n      var spinning = sp > 0.04;\n      var trail = sp;\n      var segs = 4;\n\n      // sao quay quanh tâm, để lại vệt cung tròn (star-trail)\n      ctx.lineCap = 'round';\n      for(var i=0;i<stars.length;i++){\n        var s = stars[i];\n        var ang = s.ang + rot * s.spin;\n        var tw = reduce ? 1 : (0.7 + 0.3*Math.sin(t*s.tws + s.tw));\n        var bright = Math.min(1, s.base * tw * (1 + glow*0.5));\n        var lw = s.w * (1 + glow*0.25);\n        var hx = cx + Math.cos(ang)*s.radius;\n        var hy = cy + Math.sin(ang)*s.radius;\n\n        // vệt cung mờ dần về đuôi — chỉ vẽ khi đang xoay (đứng yên thì bỏ, nhẹ hơn)\n        if(spinning){\n          for(var seg=0; seg<segs; seg++){\n            var f0 = seg/segs;\n            var a1 = ang - trail*f0;\n            var a0 = ang - trail*((seg+1)/segs);\n            var taper = 1 - f0;\n            var alpha = bright * taper * taper;\n            if(alpha < 0.018) continue;\n            ctx.beginPath();\n            ctx.arc(cx, cy, s.radius, a0, a1);\n            ctx.strokeStyle = 'rgba('+s.col+','+alpha+')';\n            ctx.lineWidth = lw;\n            ctx.stroke();\n          }\n        }\n\n        // đầu sao sáng\n        ctx.beginPath();\n        ctx.arc(hx, hy, Math.max(0.6, lw*0.9), 0, Math.PI*2);\n        ctx.fillStyle = 'rgba('+s.col+','+bright+')';\n        ctx.fill();\n        if(s.w > 1.3 && bright > 0.45){\n          ctx.beginPath();\n          ctx.arc(hx, hy, lw*2.6, 0, Math.PI*2);\n          ctx.fillStyle = 'rgba('+s.col+','+(bright*0.12)+')';\n          ctx.fill();\n        }\n      }\n\n      requestAnimationFrame(frame);\n    }\n\n    window.addEventListener('resize', resize);\n    resize();\n    requestAnimationFrame(frame);\n  })();\n\n  /* ============ TIMELINE: ramp độ fantasy + điều hướng ============ */\n  (function(){\n    // gán --t tăng dần cho từng giai đoạn (0 → 1)\n    var steps = Array.prototype.slice.call(document.querySelectorAll('.stage'));\n    var n = steps.length;\n    steps.forEach(function(s, i){\n      var t = n > 1 ? i/(n-1) : 0;\n      s.style.setProperty('--t', t.toFixed(3));\n    });\n  })();\n\n  (function(){\n    var help = document.querySelector('.tl-help');\n    if(!help) return;\n    // không cho click nút ? mở/đóng timeline; trên cảm ứng thì bật tắt chú thích\n    help.addEventListener('click', function(e){\n      e.preventDefault();\n      e.stopPropagation();\n      help.classList.toggle('is-open');\n    });\n    help.addEventListener('keydown', function(e){\n      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); help.classList.toggle('is-open'); }\n      if(e.key === 'Escape'){ help.classList.remove('is-open'); }\n    });\n    document.addEventListener('click', function(e){\n      if(!help.contains(e.target)) help.classList.remove('is-open');\n    });\n  })();\n\n  (function(){\n    function reveal(sel){\n      var target;\n      try{ target = document.querySelector(sel); } catch(e){ return; }\n      if(!target) return;\n      var node = target;\n      while(node){\n        if(node.tagName === 'DETAILS') node.open = true;\n        node = node.parentElement;\n      }\n      target.scrollIntoView({ behavior:'smooth', block:'center' });\n      target.classList.remove('is-target');\n      void target.offsetWidth;\n      target.classList.add('is-target');\n      window.setTimeout(function(){ target.classList.remove('is-target'); }, 2200);\n    }\n    window.__reveal = reveal;\n    function revealTarget(){\n      var hash = window.location.hash;\n      if(!hash || hash.length < 2) return;\n      reveal(hash);\n    }\n    window.addEventListener('hashchange', revealTarget);\n    window.addEventListener('load', function(){ window.setTimeout(revealTarget, 60); });\n  })();\n\n  /* Tích hợp timeline → thư viện: đã gộp — tải trực tiếp trên từng ô bằng nút .docx */\n\n  (function(){\n    var row  = document.querySelector('.timeline-row');\n    var prev = document.querySelector('.timeline-nav--prev');\n    var next = document.querySelector('.timeline-nav--next');\n    if(!row || !prev || !next) return;\n    function step(){\n      var card = row.querySelector('.stage');\n      var w = card ? card.getBoundingClientRect().width : 180;\n      return Math.max(160, w + 24);\n    }\n    function update(){\n      prev.disabled = row.scrollLeft <= 4;\n      next.disabled = row.scrollLeft + row.clientWidth >= row.scrollWidth - 4;\n      // tiến trình cuộn timeline → cường độ vũ trụ của nền\n      // dead zone 40% đầu, sau đó đường cong lũy thừa để sao chỉ xoay khi kéo đủ sâu\n      var max = row.scrollWidth - row.clientWidth;\n      var raw = max > 8 ? Math.min(1, Math.max(0, row.scrollLeft / max)) : 0;\n      var remapped = raw < 0.40 ? 0 : Math.pow((raw - 0.40) / 0.60, 1.6);\n      cosmicDepth = remapped;\n    }\n    prev.addEventListener('click', function(){ row.scrollBy({ left:-step()*2, behavior:'smooth' }); });\n    next.addEventListener('click', function(){ row.scrollBy({ left: step()*2, behavior:'smooth' }); });\n    row.addEventListener('scroll', update, { passive:true });\n    window.addEventListener('resize', update);\n    var toggle = document.querySelector('details.timeline-toggle');\n    if(toggle) toggle.addEventListener('toggle', function(){ window.setTimeout(update, 50); });\n    window.setTimeout(update, 60);\n  })();\n\n  /* ====== HÉ LỘ (nút ⋯) — ảnh minh hoạ + số chương + đoạn hé lộ + tải\n     ↓↓↓ SỬA NỘI DUNG Ở ĐÂY. Mỗi mục khớp theo đường dẫn .docx của ô.\n     - chapters: số chương, vd '12 chương'\n     - img: đường dẫn ảnh minh hoạ, vd 'illustrations/mythren-s1.png'  (để '' nếu chưa có)\n     - caption: mô tả ảnh, vd 'aurora đang hái hoa'\n     - teasers: vài đoạn hé lộ ngắn, KHÔNG tiết lộ plot — we var guard = 0;\n      while(arr.length > 1 && pick === prev && guard < 12){ pick = arr[Math.floor(Math.random()*arr.length)]; guard++; }\n      teaser.textContent = pick;\n    }\n    function openFor(trigger){\n      var key = trigger.getAttribute('data-peek');\n      if(!key) return;\n      var d = PEEK[key] || {};\n      card.style.setProperty('--pc', key.indexOf('/mythren/') > -1 ? 'var(--violet)' : 'var(--gold)');\n      var node = trigger.closest ? trigger.closest('.node') : null;\n      var sEl = node ? node.querySelector('.node__series') : null;\n      var tEl = node ? node.querySelector('.node__title') : null;\n      series.textContent = sEl ? sEl.textContent : (d.series || '');\n      title.textContent  = tEl ? tEl.textContent : (d.title || trigger.textContent.trim());\n      chs.textContent    = d.chapters || '— chương';\n      cap.textContent    = d.caption || '';\n      cap.style.display  = d.caption ? '' : 'none';\n      if(d.img){ img.src = d.img; imgWrap.classList.add('has-img'); }\n      else { img.removeAttribute('src'); imgWrap.classList.remove('has-img'); }\n      dlBtn.setAttribute('href', key);\n      curTeasers = d.teasers || [];\n      teaser.textContent = '';\n      roll();\n      modal.classList.add('is-open');\n      modal.setAttribute('aria-hidden','false');\n    }\n    function close(){ modal.classList.remove('is-open'); modal.setAttribute('aria-hidden','true'); }\n\n    document.addEventListener('click', function(e){\n      if(modal.contains(e.target)) return;\n      var trg = e.target.closest ? e.target.closest('[data-peek]') : null;\n      if(!trg){\n        var node = e.target.closest ? e.target.closest('.node') : null;\n        if(node) trg = node.querySelector('[data-peek]');\n      }\n      if(trg){ e.preventDefault(); e.stopPropagation(); openFor(trg); }\n    });\n    reroll.addEventListener('click', function(e){ e.stopPropagation(); roll(); });\n    closeBtn.addEventListener('click', close);\n    modal.addEventListener('click', function(e){ if(e.target === modal) close(); });\n    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') close(); });\n  })();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
